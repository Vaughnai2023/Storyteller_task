<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>n8n Pipeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.6s ease;
    padding: 40px;
  }
  .slide.active { opacity: 1; }
  .slide img {
    max-width: 92%;
    max-height: 78vh;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
  }
  .slide .label {
    margin-top: 24px;
    color: #10b981;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .slide .sublabel {
    margin-top: 8px;
    color: #94a3b8;
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="slide active" id="slide-1">
  <img src="n8n-editor.png" alt="n8n workflow editor">
  <div class="label">n8n Pipeline — Editor View</div>
  <div class="sublabel">Webhook &rarr; Validate &rarr; AI Eval &rarr; Route &rarr; Store &rarr; Alert</div>
</div>

<div class="slide" id="slide-2">
  <img src="n8n-executions.png" alt="n8n executions">
  <div class="label">Execution History</div>
  <div class="sublabel">Every story evaluation logged with full trace</div>
</div>

<div class="slide" id="slide-3">
  <img src="n8n-execution-detail.png" alt="n8n execution detail">
  <div class="label">Execution Detail — Alert Sent</div>
  <div class="sublabel">Flagged stories trigger email alerts automatically</div>
</div>

<script>
  const slides = document.querySelectorAll('.slide');
  let current = 0;
  setInterval(() => {
    slides[current].classList.remove('active');
    current = (current + 1) % slides.length;
    slides[current].classList.add('active');
  }, 3500);
</script>

</body>
</html>
